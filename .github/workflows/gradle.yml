# separate terms of service, privacy policy, and support
# documentation.
# This workflow will build a Java project with Gradle and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-gradle

name: Java CI with Gradle

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  ACCEPT_MICROEJ_SDK_EULA_V3_1B: YES

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
      
    - name: Print mac address
      run: ip a

    - name: Set mac address
      run: sudo apt-get install macchanger && sudo ifconfig eth0 down && sudo macchanger -m C8:4B:D6:5C:C0:07 eth0 && sudo ifconfig eth0 up

    - name: Run on device
      run: ./gradlew runOnDevice